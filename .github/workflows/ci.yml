name: CI

# Runs the production build automatically so every push and pull request gets a
# visible build check — no manual `npm run build` needed.
on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          LLM_PROVIDER: openai
          LLM_MODEL: gpt-4o-mini
          VITE_AUTH_API_URL: ""
